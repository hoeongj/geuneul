# gitleaks 설정 — 기본 룰셋 사용 + 예시/문서의 placeholder는 오탐 방지로 허용.
title = "geuneul gitleaks"

[extend]
useDefault = true

[allowlist]
description = "예시 파일의 placeholder만 허용(실제 비밀 아님). 파일 전체 제외가 아니라 값 패턴만 — 예시 파일에 실수로 진짜 키를 붙여 넣으면 여전히 잡힌다. 실제 비밀은 .local/·.env(gitignore)로만."
regexes = [
  '''CHANGE-ME[\w가-힣.-]*''',
]
