# Grafana 프로비저닝 — 로컬 전용(ADR-0014). Prometheus(메트릭, pull) + Tempo(트레이스, OTLP push) 두 소스만.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: geuneul-prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Tempo
    type: tempo
    uid: geuneul-tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      httpMethod: GET
      # 트레이스 화면에서 "이 스팬의 메트릭 보기"로 Prometheus를 바로 연결(서비스그래프는 미사용이라
      # tracesToMetrics만 유용한 최소 연동).
      tracesToMetrics:
        datasourceUid: geuneul-prometheus
