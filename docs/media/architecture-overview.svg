<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 610" role="img" aria-labelledby="title desc">
  <title id="title">그늘 서비스 구조 한눈에 보기</title>
  <desc id="desc">브라우저와 PWA, Vercel BFF, AWS API, 데이터 저장소, 외부 API, 배포와 데이터 동기화의 관계를 보여 주는 간단한 구조도</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#344054"/></marker>
    <marker id="dashArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#667085"/></marker>
    <style>
      .title { font: 700 20px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #172b24; }
      .label { font: 700 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #172b24; }
      .sub { font: 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #52615a; }
      .small { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #667085; }
      .line { stroke: #344054; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #667085; stroke-width: 2.2; fill: none; stroke-dasharray: 7 6; marker-end: url(#dashArrow); }
    </style>
  </defs>

  <rect width="1200" height="610" fill="#fbfcfa"/>
  <text x="56" y="56" class="title">그늘 서비스 구조</text>
  <text x="56" y="82" class="sub">사용자 요청, 데이터 처리, 배포 흐름을 한 장으로 정리했습니다.</text>

  <rect x="55" y="155" width="170" height="110" rx="16" fill="#edf7f1" stroke="#80b59a" stroke-width="2"/>
  <text x="140" y="202" text-anchor="middle" class="label">브라우저 · PWA</text>
  <text x="140" y="228" text-anchor="middle" class="sub">웹 · 설치형 앱</text>

  <rect x="290" y="155" width="185" height="110" rx="16" fill="#fff" stroke="#1f2937" stroke-width="2"/>
  <text x="382" y="194" text-anchor="middle" class="label">Vercel</text>
  <text x="382" y="220" text-anchor="middle" class="sub">Next.js BFF</text>
  <text x="382" y="243" text-anchor="middle" class="small">동일 오리진 /api/*</text>

  <rect x="540" y="105" width="600" height="330" rx="18" fill="#fff" stroke="#52616b" stroke-width="2"/>
  <text x="572" y="140" class="label">AWS</text>

  <rect x="580" y="175" width="155" height="80" rx="13" fill="#f0edff" stroke="#8b7ad8" stroke-width="1.8"/>
  <text x="657" y="207" text-anchor="middle" class="label">CloudFront · ALB</text>
  <text x="657" y="232" text-anchor="middle" class="sub">HTTPS · 진입점</text>

  <rect x="790" y="165" width="170" height="100" rx="13" fill="#fff2e5" stroke="#e87d27" stroke-width="1.8"/>
  <text x="875" y="202" text-anchor="middle" class="label">ECS Fargate</text>
  <text x="875" y="228" text-anchor="middle" class="sub">Spring Boot · PostGIS 검색</text>
  <text x="875" y="249" text-anchor="middle" class="small">survival_score · API</text>

  <rect x="1015" y="170" width="95" height="86" rx="13" fill="#eaf3ff" stroke="#5590cc" stroke-width="1.8"/>
  <text x="1062" y="207" text-anchor="middle" class="label">RDS</text>
  <text x="1062" y="232" text-anchor="middle" class="sub">PostGIS</text>

  <rect x="790" y="315" width="145" height="75" rx="13" fill="#fff0ef" stroke="#d96b62" stroke-width="1.8"/>
  <text x="862" y="347" text-anchor="middle" class="label">Redis</text>
  <text x="862" y="370" text-anchor="middle" class="sub">날씨 · 조회 캐시</text>

  <rect x="990" y="315" width="120" height="75" rx="13" fill="#fff0ef" stroke="#d96b62" stroke-width="1.8"/>
  <text x="1050" y="347" text-anchor="middle" class="label">S3</text>
  <text x="1050" y="370" text-anchor="middle" class="sub">사진 저장</text>

  <rect x="55" y="345" width="420" height="95" rx="16" fill="#f8fafc" stroke="#98a2b3" stroke-width="1.8" stroke-dasharray="7 5"/>
  <text x="80" y="378" class="label">외부 API</text>
  <text x="80" y="407" class="sub">Kakao 지도·경로·로그인 · 기상청 날씨 · AI 요약</text>

  <rect x="55" y="500" width="230" height="66" rx="14" fill="#e9f6ff" stroke="#5794bb" stroke-width="1.8"/>
  <text x="170" y="529" text-anchor="middle" class="label">GitHub Actions → ECR</text>
  <text x="170" y="551" text-anchor="middle" class="sub">테스트 · 이미지 배포</text>

  <rect x="350" y="500" width="235" height="66" rx="14" fill="#fdf0f8" stroke="#d56f9d" stroke-width="1.8"/>
  <text x="467" y="529" text-anchor="middle" class="label">EventBridge Scheduler</text>
  <text x="467" y="551" text-anchor="middle" class="sub">도서관 데이터 월간 동기화</text>

  <path d="M225 210 H280" class="line"/>
  <path d="M475 210 H570" class="line"/>
  <path d="M735 215 H780" class="line"/>
  <path d="M960 215 H1005" class="line"/>
  <path d="M875 265 V305" class="line"/>
  <path d="M950 250 C980 280 1005 300 1032 310" class="line"/>
  <path d="M475 385 C590 385 655 330 785 255" class="dash"/>
  <path d="M285 533 H770 C790 533 805 500 835 270" class="dash"/>
  <path d="M585 533 H720 C750 533 770 480 810 270" class="dash"/>
  <text x="606" y="370" class="small">서버에서만 외부 API 호출</text>
  <text x="610" y="520" class="small">OIDC 배포</text>
  <text x="655" y="557" class="small">RunTask</text>
</svg>
