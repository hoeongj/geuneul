# pnpm 11: 네이티브 빌드 스크립트 허용 목록(공급망 안전 — 명시한 것만 빌드).
# sharp = next/image 최적화, unrs-resolver = eslint import 해석, oxide = tailwind v4 엔진.
onlyBuiltDependencies:
  - sharp
  - unrs-resolver
  - "@tailwindcss/oxide"

# Next.js 16.2.10이 고정하는 PostCSS 8.4.31의 보안 패치.
# PostCSS 8 API 호환 버전으로 해석해 GHSA-qx2v-qp2m-jg93을 제거한다.
overrides:
  postcss: 8.5.16
