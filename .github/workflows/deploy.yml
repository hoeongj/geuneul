name: Deploy (AWS ECS)

# main에 백엔드 변경이 push되면: 이미지 빌드 → ECR push → ECS 태스크 리비전 갱신 → 서비스 롤링 배포.
# 인증은 GitHub OIDC로 AWS 역할을 assume(장기 액세스키 없음 = 2026 베스트프랙티스).
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write        # OIDC 토큰 발급용

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: geuneul
  ECS_CLUSTER: geuneul
  ECS_SERVICE: geuneul
  ECS_TASK_FAMILY: geuneul
  CONTAINER_NAME: geuneul

jobs:
  deploy:
    name: Build & Deploy to ECS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}   # Terraform output github_actions_role_arn
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        id: build
        working-directory: backend
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Fetch current task definition
        run: |
          aws ecs describe-task-definition --task-definition "$ECS_TASK_FAMILY" \
            --query taskDefinition > task-def.json

      - name: Render new image into task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS (rolling)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
