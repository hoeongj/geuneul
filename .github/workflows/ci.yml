name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: backend

jobs:
  backend:
    name: Backend (Gradle, JDK 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6
      - name: Test + coverage
        # Testcontainers(PostGIS, Redis)는 ubuntu-latest의 Docker 데몬 위에서 실행된다.
        # Docker 없는 로컬에서는 self-skip(disabledWithoutDocker). jacoco 검증이 커버리지
        # floor 아래로 떨어지면 빌드 실패(현재 floor 0.00, 로직 붙으면 ratchet 상향).
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification
      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: backend-test-report
          path: backend/build/reports/tests/test
          retention-days: 7
