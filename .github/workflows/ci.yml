name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: backend

jobs:
  backend:
    name: Backend (Gradle, JDK 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6
      - name: Test + coverage
        # Testcontainers(PostGIS)는 ubuntu-latest의 Docker 데몬 위에서 실행된다.
        # Docker 없는 로컬에서는 self-skip(disabledWithoutDocker). 커버리지 floor 값의 단일 출처는
        # build.gradle의 jacocoTestCoverageVerification(현재 0.35) — 그 아래로 떨어지면 빌드 실패.
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification
      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: backend-test-report
          path: backend/build/reports/tests/test
          retention-days: 7
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: jacoco-coverage-report
          path: backend/build/reports/jacoco/test/html
          retention-days: 7

  # 워크플로우 규칙 D("커밋 전 비밀 유출 스캔") + CLAUDE.md §7 스택의 gitleaks를 CI로 강제.
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0   # 전체 히스토리 스캔(과거 커밋에 새어든 비밀도 탐지)
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
