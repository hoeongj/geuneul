server:
  port: ${PORT:8080}          # ECS 태스크 정의(ecs.tf)가 PORT=8080을 주입. 로컬 기본 8080.

spring:
  application:
    name: geuneul
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:geuneul}
    username: ${DB_USERNAME:geuneul}
    password: ${DB_PASSWORD:geuneul}   # 로컬 개발 기본값. 실제 비밀은 .env/시크릿으로만(규칙 D).
  jpa:
    hibernate:
      ddl-auto: validate               # 스키마 소유권은 Flyway. JPA는 검증만 한다.
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}     # 로컬은 빈값. P3 캐시 도입 시 관리형 Redis 비밀을 env로 주입.
      ssl:
        enabled: ${REDIS_SSL:false}    # 관리형 Redis(TLS)면 true

kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:}   # 지오코딩(주소→좌표) + 카카오 로그인 client_id(같은 앱). 규칙 D.
  oauth:
    client-secret: ${KAKAO_CLIENT_SECRET:}  # 선택(콘솔 [보안] "사용함"일 때만). 비면 미전송.

google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID:}         # 구글 OAuth 웹 클라이언트. 규칙 D: 값은 .env/SSM으로만.
    client-secret: ${GOOGLE_CLIENT_SECRET:}

jwt:
  secret: ${JWT_SECRET:}          # HS256 서명키(≥32바이트). 규칙 D: .env/SSM으로만. 미설정이어도 부팅됨(발급/검증 시점 검사).
  expiration-hours: ${JWT_EXPIRATION_HOURS:168}  # 세션 만료 기본 7일.

weather:
  # 기상청 초단기실황(getUltraSrtNcst). 공공데이터포털 serviceKey. 규칙 D: 값은 .env/SSM으로만.
  # data.go.kr의 이중 인코딩 함정 회피를 위해 **디코딩 키**를 넣는다(UriBuilder가 한 번만 인코딩).
  service-key: ${KMA_SERVICE_KEY:}

ai:
  summary:
    # 장소 AI 한줄 요약(P3, 곁다리) — 프로바이더 중립 OpenAI 호환 Chat Completions 클라이언트(현재 Mistral).
    # Anthropic 키가 없어 CLAUDE.md §8 "Claude API 기본"에서 이탈(근거는 WORKLOG·ADR-0010). 지연검증(값
    # 주입 전 배포돼도 앱은 뜬다, ChatCompletionClient가 호출 시점에 미설정을 감지해 empty로 폴백) —
    # 규칙 D: 값은 .env/SSM으로만.
    api-key: ${AI_SUMMARY_API_KEY:}
    base-url: ${AI_SUMMARY_BASE_URL:https://api.mistral.ai/v1}
    # 2026-07 확인: 기존 프로바이더 무료티어 플랫폼 전반 429, Groq 키 무효, Gemini 429, DeepInfra 잔액부족을
    # 차례로 확인 후 Mistral만 생존(WORKLOG 근거) — mistral-small-latest가 한국어 요약 품질 양호,
    # 침수 위험 순화 표현도 우수. 모델 교체는 이 값만 바꾸면 된다(코드 변경 불필요, base-url·key도 동일).
    model: ${AI_SUMMARY_MODEL:mistral-small-latest}

datago:
  # 공부공간 커버리지 확장(ADR-0006) — 도서관/상권정보 오픈API 공용 인증키.
  # data.go.kr은 계정당 인증키 하나가 모든 활용신청(오픈API)에서 공유된다(KMA_SERVICE_KEY와 같은 값).
  # 규칙 D: 값은 .env/SSM으로만.
  service-key: ${DATA_GO_KR_SERVICE_KEY:}

geuneul:
  # BFF(Vercel 서버 프록시) ↔ 백엔드 공유 시크릿. 설정되면 익명 제보 레이트리밋이 BFF가 준
  # 실 클라이언트 IP(X-Client-Ip, X-Proxy-Auth로 증명)를 신뢰 → XFF 위조 우회 차단(ProxyClientResolver).
  # 미설정(현재)이면 기존 호환(최좌측 XFF). 활성화는 Vercel env + 백엔드 env 동일값 주입. 값은 SSM으로만.
  proxy-secret: ${GEUNEUL_PROXY_SECRET:}

aws:
  s3:
    # 제보/후기 사진 버킷(P2 presign). 비면 PhotoService가 호출 시점에 명확히 실패(JwtService와 동일한
    # 지연 검증 패턴 — 값 주입 전 배포돼도 앱 자체는 뜬다). 값은 terraform output(s3_photos_bucket)로 확정.
    bucket: ${S3_BUCKET_NAME:}
    region: ${AWS_REGION:ap-northeast-2}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        # ADR-0014: prometheus는 옵트인(기본 health,info만) — ECS는 MANAGEMENT_EXPOSURE를 안 주입하므로
        # 프로덕션은 항상 이 기본값(prometheus 미노출). 로컬 observability 스택(docker-compose --profile
        # observability)에서 백엔드를 그 프로필로 띄울 때만 health,info,prometheus로 켠다.
        # (2026-07 라이브 재확인: 이 옵트인 도입 전엔 health,info,prometheus가 하드코딩돼 있어
        # /actuator/prometheus가 ALB를 통해 인증 없이 공개돼 있었다 — 이번 변경이 그 노출을 닫는다.)
        include: ${MANAGEMENT_EXPOSURE:health,info}
  endpoint:
    health:
      probes:
        enabled: true
  health:
    redis:
      enabled: false     # Redis 미프로비저닝 단계 — ALB 헬스체크(/actuator/health) 방해 방지. P3 캐시 도입 시 재활성화.
  metrics:
    tags:
      application: ${spring.application.name}   # Prometheus job 여러 개를 붙일 로컬 Grafana에서 app별 필터링용
    distribution:
      percentiles-histogram:
        # 히스토그램 버킷을 켜야 Grafana에서 histogram_quantile(p95/p99)을 계산할 수 있다(기본은 count/sum/max뿐
        # — 평균만 가능). HTTP 전체 + 커스텀 반경/kNN 타이머 3개만 켠다(전 메트릭 히스토그램은 카디널리티·저장
        # 비용이 커 과설계, CLAUDE.md §0-2). k6(ADR-0012)가 이미 p95/p99로 보고하므로 같은 기준으로 맞춘다.
        http.server.requests: true
        geuneul.place.search.radius: true
        geuneul.place.search.nearest: true
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLING_PROBABILITY:1.0}   # 트래픽이 적어(포트폴리오 규모) 전량 샘플링 기본값
    export:
      otlp:
        enabled: ${OTEL_TRACING_EXPORT_ENABLED:false}        # 미설정이면 OTLP 트레이스 익스포터 자체를 비활성(주기 전송 시도 없음)
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:}           # 예: http://localhost:4318/v1/traces (로컬 Tempo)
  otlp:
    metrics:
      export:
        enabled: ${OTEL_METRICS_EXPORT_ENABLED:false}         # 메트릭은 prometheus 스크레이프가 1순위 — otlp push는 옵트인
        url: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:}           # 관리형 백엔드(Grafana Cloud 등) 연결 시에만 채운다(ADR-0014 §5, 프로덕션 미적용)
