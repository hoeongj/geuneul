server:
  port: ${PORT:8080}          # Railway 등 PaaS는 $PORT를 주입한다. 로컬 기본 8080.

spring:
  application:
    name: geuneul
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:geuneul}
    username: ${DB_USERNAME:geuneul}
    password: ${DB_PASSWORD:geuneul}   # 로컬 개발 기본값. 실제 비밀은 .env/시크릿으로만(규칙 D).
  jpa:
    hibernate:
      ddl-auto: validate               # 스키마 소유권은 Flyway. JPA는 검증만 한다.
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}     # 로컬은 빈값, PaaS Redis는 주입
      ssl:
        enabled: ${REDIS_SSL:false}    # Upstash 등 TLS Redis면 true

kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:}   # 지오코딩(주소→좌표). 규칙 D: 값은 .env/SSM으로만.

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    redis:
      enabled: false     # Redis 미프로비저닝 단계 — ALB 헬스체크(/actuator/health) 방해 방지. P3 캐시 도입 시 재활성화.
