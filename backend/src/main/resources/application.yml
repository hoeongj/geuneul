spring:
  application:
    name: geuneul
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:geuneul}
    username: ${DB_USERNAME:geuneul}
    password: ${DB_PASSWORD:geuneul}   # 로컬 개발 기본값. 실제 비밀은 .env/시크릿으로만(규칙 D).
  jpa:
    hibernate:
      ddl-auto: validate               # 스키마 소유권은 Flyway. JPA는 검증만 한다.
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
